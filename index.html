<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume Pet - Cuidado que ilumina</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="site-header">
        <a href="#home" class="site-header__logo" aria-label="Ir para o início">
            <img
                src="./assets/images/lume-pet-logo.webp"
                alt="Lume Pet logo"
                width="168"
                height="60"
            >
        </a>

        <button
            class="menu-toggle"
            type="button"
            aria-label="Abrir menu"
            aria-controls="main-navigation"
            aria-expanded="false"
        >
            <svg class="menu-toggle__open" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
            <svg class="menu-toggle__close" aria-hidden="true" viewBox="0 0 24 24">
                <path d="m6 6 12 12M18 6 6 18" />
            </svg>
        </button>

        <nav id="main-navigation" class="main-navigation" aria-label="Navegação principal">
            <ul>
                <li><a href="#home">Início</a></li>
                <li><a href="#about">Sobre</a></li>
                <li><a href="#services">Serviços</a></li>
                <li><a href="#contact">Contato</a></li>
            </ul>

            <a href="#contact" class="contact-button contact-button--mobile">
                Contate-nos
            </a>
        </nav>

        <a href="#contact" class="contact-button contact-button--desktop cta-button">
            Contate-nos
        </a>
    </header>

    <main>
        <section id="home">
            <div id="home-cta">
                <h1>Cuidado que <span class="highlight">ilumina</span> a vida do seu pet</h1>
                <p>Carinho, segurança e bem-estar em cada atendimento, porque seu melhor amigo merece um cuidado especial.</p>
                <a href="#contact" class="cta-button">Agendar atendimento</a>           
            </div>

            <img id="home-cat-hero" src="./assets/images/cat-hero.webp" alt="Imagem de um gato, olhando para a direita.">
        </section>
    </main>

    <script src="js/header.js"></script>
</body>
</html>
